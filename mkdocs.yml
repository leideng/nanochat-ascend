      - SFT Datasets: datasets/sft.md
      - RL Dataset: datasets/rl.md
      - Base Evaluation Dataset: datasets/base-evaluation.md
      - Chat Evaluation Datasets: datasets/chat-evaluation.md
  - Model: model.md
  - Processes:
      - Dataset Preparation: processes/dataset-preparation.md
      - Pretrain Process: processes/pretrain.md
      - SFT Process: processes/sft.md
      - RL Process: processes/rl.md
  - Results: results.md
  - Demo: demo.md
