device: cpu
dataset:
  root: .cache/dataset
  pretrain: pretrain/fineweb-edu-100b-shuffle-sample
  eval: eval # source: https://karpathy-public.s3.us-west-2.amazonaws.com/eval_bundle.zip
  task:
    root: task
    identity_conversations: identity_conversations.jsonl # source: https://karpathy-public.s3.us-west-2.amazonaws.com/identity_conversations.jsonl
    simple_spelling: words_alpha.txt # source: https://raw.githubusercontent.com/dwyl/english-words/refs/heads/master/words_alpha.txt
    allenai_arc: ai2_arc
    openai_gsm8k: gsm8k
    openai_humaneval: humaneval
    cais_mmlu: mmlu
    huggingface_tb_smol_smoltalk: smol-smoltalk
checkpoint:
  root: .cache/checkpoint
  base: base_checkpoints
  chatsft: chatsft_checkpoints
  chatrl: chatrl_checkpoints
output:
  root: .cache/output
  base_eval: base_eval
  tokenizer: tokenizer
  report: report
enforce_eager: true # disable torch.compile
